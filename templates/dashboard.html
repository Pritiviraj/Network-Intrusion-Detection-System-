<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIDS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090f;color:#dde3f5;font-family:'Segoe UI',sans-serif;font-size:15px;}
header{background:#0d1017;padding:16px 28px;border-bottom:1px solid #1c2235;
       display:flex;align-items:center;gap:14px;}
.live{width:8px;height:8px;background:#34d399;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
header h1{font-size:1.15rem;font-weight:700;}
.updated{margin-left:auto;font-size:12px;color:#5a6380;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
       gap:14px;padding:22px 28px;}
.stat{background:#0d1017;border:1px solid #1c2235;border-radius:10px;padding:18px 20px;text-align:center;}
.stat .n{font-size:2.2rem;font-weight:700;color:#4c8cf8;}
.stat.c .n{color:#f87171;}
.stat.w .n{color:#fbbf24;}
.stat.g .n{color:#34d399;}
.stat .l{font-size:12px;color:#5a6380;margin-top:4px;}
.refresh{display:inline-block;margin:0 28px 16px;padding:8px 20px;
         background:#1c2235;border:1px solid #232a3e;border-radius:7px;
         cursor:pointer;font-size:13px;color:#dde3f5;}
.refresh:hover{background:#232a3e;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 28px 20px;}
.card{background:#0d1017;border:1px solid #1c2235;border-radius:10px;padding:18px;}
.card h3{font-size:11px;color:#5a6380;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}
.tbl-wrap{margin:0 28px 28px;background:#0d1017;border:1px solid #1c2235;border-radius:10px;overflow:hidden;}
.tbl-head{padding:12px 18px;border-bottom:1px solid #1c2235;font-size:11px;color:#5a6380;text-transform:uppercase;letter-spacing:.07em;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#07090f;padding:9px 14px;text-align:left;color:#5a6380;font-size:11px;text-transform:uppercase;}
td{padding:9px 14px;border-top:1px solid #131720;}
tr:hover td{background:rgba(255,255,255,.015);}
.s1{color:#f87171;font-weight:700;}
.s2{color:#fbbf24;font-weight:600;}
.s3{color:#22d3ee;}
.ts{font-family:monospace;font-size:12px;color:#5a6380;}
.empty{text-align:center;padding:40px;color:#5a6380;font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="live"></div>
  <h1>Network Intrusion Detection System &mdash; Live Dashboard</h1>
  <span class="updated" id="upd"></span>
</header>

<div class="stats">
  <div class="stat"><div class="n" id="total">0</div><div class="l">Total Alerts</div></div>
  <div class="stat"><div class="n" id="attackers">0</div><div class="l">Unique Attackers</div></div>
  <div class="stat c"><div class="n" id="crit">0</div><div class="l">Critical (Sev 1)</div></div>
  <div class="stat w"><div class="n" id="high">0</div><div class="l">High (Sev 2)</div></div>
</div>

<button class="refresh" onclick="load()">↻ Refresh Now</button>

<div class="charts">
  <div class="card"><h3>Top Attack Signatures</h3><canvas id="sigC"></canvas></div>
  <div class="card"><h3>Alerts by Category</h3><canvas id="catC"></canvas></div>
</div>

<div class="tbl-wrap">
  <div class="tbl-head">Recent Alerts (last 25)</div>
  <table>
    <thead><tr>
      <th>Time</th><th>Source IP</th><th>Signature</th>
      <th>Severity</th><th>Category</th><th>Protocol</th>
    </tr></thead>
    <tbody id="tb"><tr><td colspan="6" class="empty">Waiting for alerts...</td></tr></tbody>
  </table>
</div>

<script>
let sc,cc;
const CLRS=['#4c8cf8','#8b5cf6','#34d399','#fbbf24','#f87171','#22d3ee','#f472b6','#fb923c'];
async function load(){
  try{
    const d=await fetch('/api/data').then(r=>r.json());
    document.getElementById('total').textContent    =d.total_alerts||0;
    document.getElementById('attackers').textContent=d.unique_attackers||0;
    document.getElementById('crit').textContent     =d.by_severity?.['1']||0;
    document.getElementById('high').textContent     =d.by_severity?.['2']||0;
    document.getElementById('upd').textContent      ='Updated: '+new Date().toLocaleTimeString();
    const sL=(d.top_signatures||[]).map(s=>(s[0]||'').substring(0,30));
    const sV=(d.top_signatures||[]).map(s=>s[1]);
    if(sc)sc.destroy();
    sc=new Chart(document.getElementById('sigC'),{
      type:'bar',
      data:{labels:sL,datasets:[{data:sV,backgroundColor:'#4c8cf8',borderRadius:4}]},
      options:{indexAxis:'y',plugins:{legend:{display:false}},
               scales:{x:{ticks:{color:'#5a6380'},grid:{color:'#131720'}},
                       y:{ticks:{color:'#5a6380',font:{size:11}},grid:{color:'#131720'}}}}
    });
    const cL=(d.by_category||[]).map(c=>c[0]||'Unknown');
    const cV=(d.by_category||[]).map(c=>c[1]);
    if(cc)cc.destroy();
    cc=new Chart(document.getElementById('catC'),{
      type:'doughnut',
      data:{labels:cL,datasets:[{data:cV,backgroundColor:CLRS}]},
      options:{plugins:{legend:{labels:{color:'#dde3f5',font:{size:11}}}}}
    });
    const tb=document.getElementById('tb');
    if(!d.recent_alerts||d.recent_alerts.length===0){
      tb.innerHTML='<tr><td colspan="6" class="empty">No alerts yet. Run simulations in Phase 7.</td></tr>';
    }else{
      tb.innerHTML='';
      d.recent_alerts.forEach(a=>{
        const s=a.severity,cls=s==1?'s1':s==2?'s2':'s3';
        const t=a.timestamp?new Date(a.timestamp).toLocaleTimeString():'';
        tb.innerHTML+=`<tr>
          <td class="ts">${t}</td>
          <td>${a.src_ip||'—'}</td>
          <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.signature||'—'}</td>
          <td class="${cls}">${s||'—'}</td>
          <td>${a.category||'—'}</td>
          <td>${a.proto||'—'}</td>
        </tr>`;
      });
    }
  }catch(e){console.error('Dashboard load error:',e);}
}
load();
setInterval(load,30000);
</script>
</body>
</html>
